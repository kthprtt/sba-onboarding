.nl{font-family:'Archivo Black';font-size:14px;color:var(--gd);white-space:nowrap}.nl small{font-family:'DM Sans';font-weight:300;font-size:9px;color:var(--gy);margin-left:5px}
.nt{display:flex;gap:2px;margin-left:auto;overflow-x:auto;scrollbar-width:none}.nt::-webkit-scrollbar{display:none}
.tb{padding:6px 12px;font-family:'JetBrains Mono';font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--gy);background:0;border:0;cursor:pointer;border-radius:4px;transition:.2s;white-space:nowrap}.tb:hover{color:var(--wt)}.tb.on{color:var(--gd);background:rgba(239,164,32,.06)}

.slip{width:min(700px,95vw);background:var(--sl);border:1px solid var(--slB);border-radius:14px;overflow:hidden;box-shadow:0 14px 40px rgba(0,0,0,.5);margin:12px auto}

.odd .xtra{margin-top:5px;font-size:10px;color:var(--gy);line-height:1.5}.odd .xtra .sv{font-family:'JetBrains Mono';font-weight:600}.odd .xtra .pv{font-family:'JetBrains Mono';font-weight:700;color:var(--gn2)}
.tot{padding:10px 14px;text-align:center;border-top:1px solid var(--slB)}.tot .big{font-family:'JetBrains Mono';font-size:24px;font-weight:700}.tot .ts{font-size:10px;color:var(--gy);margin-top:2px;font-family:'JetBrains Mono';letter-spacing:1px}
.sbtn{display:block;width:calc(100% - 28px);margin:0 14px 10px;padding:12px;border-radius:10px;border:none;font-family:'DM Sans';font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;transition:.3s;text-transform:uppercase;text-align:center}
.sbtn.gl{background:linear-gradient(135deg,var(--gd),var(--gd2));color:var(--bg)}.sbtn.gn{background:linear-gradient(135deg,var(--gn),var(--gn2));color:var(--bg)}.sbtn.pp{background:linear-gradient(135deg,var(--pp),#D1A8FF);color:var(--bg)}
.sbtn:hover{transform:translateY(-1px)}

.plain{background:rgba(239,164,32,.02);border-left:3px solid var(--gd);padding:10px 14px;margin:6px 0;font-size:13px;color:var(--gy);line-height:1.65;border-radius:0 6px 6px 0}.plain strong{color:var(--gd2)}.plain .mint{color:var(--gn2)}
.ex{background:var(--b2);border:1px solid rgba(255,255,255,.03);border-radius:12px;padding:18px;margin:12px auto;max-width:700px}.ex-t{font-family:'Archivo Black';font-size:17px;margin-bottom:6px}.ex-b{font-size:13px;color:var(--gy);line-height:1.7}.ex-b strong{color:var(--wt)}

.mv-bx.lit{border-color:var(--gn);box-shadow:0 0 24px rgba(0,230,118,.12)}.mv-bx.glit{border-color:var(--gd);box-shadow:0 0 24px rgba(239,164,32,.12)}
.mv-ar{font-size:22px;color:var(--gd);font-family:'JetBrains Mono';font-weight:700}
.term{background:#080C14;border:1px solid rgba(255,255,255,.04);border-radius:12px;overflow:hidden;margin:16px auto;width:min(700px,95vw);box-shadow:0 12px 40px rgba(0,0,0,.5)}
.term-bar{display:flex;gap:6px;padding:10px 14px;background:rgba(255,255,255,.015);border-bottom:1px solid rgba(255,255,255,.04);align-items:center}
.dot{width:10px;height:10px;border-radius:50%}.dr{background:#FF5F57}.dy{background:#FEBC2E}.dg{background:#28C840}

.tl{position:relative;padding-left:20px;max-width:600px;margin:12px auto}.tl::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--gd),var(--gn))}

@media(max-width:768px){.g2,.g3{grid-template-columns:1fr}.slip{width:98vw}.orow{padding:8px 10px}.odd .ov{font-size:18px}.mv-bx{min-width:90px;padding:14px}.mv-bx .n{font-size:20px}.nt{display:none}}

<body>
<nav><div class="nl">SBA <small>Betting Academy</small></div><div class="nt" id="tabs"></div></nav>
<div id="app"></div>
<script>
const $=id=>document.getElementById(id);let cur='cover',TT=[];
function clr(){TT.forEach(clearTimeout);TT=[]}
function fmt(n){return'$'+n.toLocaleString()}
function dl(ms){return new Promise(r=>{TT.push(setTimeout(r,ms))})}
function aV(el,s,e,d){if(!el)return;const t0=performance.now();!function f(n){const p=Math.min((n-t0)/d,1);const v=Math.floor(s+(e-s)*(1-Math.pow(1-p,3)));el.textContent='$'+v.toLocaleString();if(p<1)requestAnimationFrame(f)}(t0)}
const T=[{id:'cover',l:'Home'},{id:'sure',l:'Sure Bet'},{id:'value',l:'Value Bets'},{id:'dvb',l:'DVB'},{id:'power',l:'Power Play'},{id:'middle',l:'Middles'},{id:'stack',l:'Full Stack'},{id:'calc',l:'Calculator'},{id:'anti',l:'Stealth'},{id:'week1',l:'Week 1'}];
function nav(){$('tabs').innerHTML=T.map(t=>`<button class="tb${t.id===cur?' on':''}" onclick="go('${t.id}')">${t.l}</button>`).join('')}
function go(id){clr();cur=id;nav();ren();window.scrollTo({top:0})}
function ren(){$('app').innerHTML=`<div class="V on">${(W[cur]||W.cover)()}</div>`;setTimeout(()=>{const h=H[cur];if(h)h()},100)}
const H={};const W={};

W.cover=()=>`<div style="min-height:90vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative"><div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(239,164,32,.04),transparent 60%);pointer-events:none"></div><div style="position:relative;z-index:1"><div style="margin-bottom:16px"><span class="bdg o"><span class="dt"></span> SBA BETTING ACADEMY</span></div><h1 style="font-family:'Archivo Black';font-size:clamp(36px,7vw,72px);line-height:.92">MASTER THE<br><span class="gd">MATH</span></h1><p style="font-size:15px;color:var(--gy);max-width:460px;margin:14px auto 0;line-height:1.7">5 strategies. Zero risk. One system.<br><strong style="color:var(--wt)">Your path to a million.</strong></p><div style="display:flex;gap:24px;justify-content:center;margin-top:28px;flex-wrap:wrap" id="cov-s"></div><div style="margin-top:28px"><button class="sbtn gl" style="width:auto;padding:14px 32px;display:inline-block" onclick="go('sure')">START LEARNING →</button></div><div style="margin-top:16px;font-size:11px;color:var(--gy)"><a href="https://affiliate.sportsbetarbitrage.com" style="color:var(--gd);text-decoration:none">← Back to Portal</a></div></div></div>`;
H.cover=async()=>{const s=[['5','Strategies'],['0%','Risk'],['$7K+','Monthly'],['460%','Max Stack']];await dl(300);$('cov-s').innerHTML=s.map((x,i)=>`<div style="opacity:0;animation:fu .5s ease ${i*150}ms forwards"><div style="font-family:'JetBrains Mono';font-size:24px;font-weight:700;color:var(--gn)">${x[0]}</div><div style="font-family:'JetBrains Mono';font-size:8px;letter-spacing:2px;color:var(--gy)">${x[1].toUpperCase()}</div></div>`).join('')};

W.sure=()=>`<div class="S"><div class="label">Strategy 1 · Zero Risk</div><div class="title">🔒 Sure Bet — <span class="gn">Guaranteed Profit</span></div><div class="explain">Two sportsbooks disagree on the odds. You bet BOTH sides. One has to win. You profit either way.</div></div><div class="slip" id="sb-slip"><div class="slip-top"><span class="sp">SBA GENIUS · SURE BET</span><span class="lv"><span class="dt"></span> LIVE</span></div><div style="padding:8px 14px;font-size:11px;color:var(--gy)">🏀 NBA — <strong style="color:var(--wt)">Lakers vs Celtics</strong> · Moneyline</div><div class="orow"><div class="odd" id="sb1"><div class="ov pl">+150</div><div class="ol">Lakers ML</div><div class="ob">DRAFTKINGS</div><div class="xtra" id="sbx1"></div></div><div class="odd" id="sb2"><div class="ov mn">-130</div><div class="ol">Celtics ML</div><div class="ob">FANDUEL</div><div class="xtra" id="sbx2"></div></div></div><div class="tot" id="sbt"></div><div id="sbb"><button class="sbtn gn" onclick="simSB()">▶ SIMULATE BET</button></div></div><div class="math-viz" id="sbv" style="display:none"></div><div id="sbe" style="display:none"></div><div class="nxt"><button class="sbtn gl" style="width:auto;margin:0 auto;padding:12px 28px" onclick="go('value')">NEXT: VALUE BETS →</button></div>`;
H.sure=async()=>{await dl(500);$('sb1').classList.add('act');await dl(400);$('sb2').classList.add('act')};
function simSB(){$('sbx1').innerHTML='<div class="sv">Stake: $400</div><div class="pv">Payout: $1,000</div>';$('sbx2').innerHTML='<div class="sv">Stake: $600</div><div class="pv">Payout: $1,062</div>';$('sb1').classList.add('gact');$('sb2').classList.add('gact');$('sbt').innerHTML='<div class="big" style="color:var(--gn)">+$62.00</div><div class="ts">GUARANTEED PROFIT · NO MATTER WHO WINS</div>';$('sbb').innerHTML='<div style="padding:8px 14px;text-align:center"><span class="bdg g"><span class="dt"></span> ZERO RISK</span></div>';$('sbv').style.display='flex';$('sbv').innerHTML=`<div class="mv-bx" id="sv1"><div class="n" style="color:var(--gy)">$400</div><div class="l">Side A · DK</div></div><div class="mv-ar">+</div><div class="mv-bx" id="sv2"><div class="n" style="color:var(--gy)">$600</div><div class="l">Side B · FD</div></div><div class="mv-ar">=</div><div class="mv-bx" id="sv3"><div class="n" style="color:var(--gn)">+$62</div><div class="l">GUARANTEED</div></div>`;setTimeout(()=>{$('sv1').classList.add('lit');$('sv2').classList.add('lit')},300);setTimeout(()=>{$('sv3').classList.add('glit')},800);$('sbe').style.display='block';$('sbe').innerHTML=`<div class="ex" style="animation:fu .5s ease"><div class="ex-t">Why This Works</div><div class="ex-b">DraftKings thinks Lakers have 40% chance. FanDuel thinks Celtics have 43%. Total: <strong>83% — less than 100%.</strong> The gap is your profit. SBA scans <strong>60+ leagues every 60 seconds</strong> finding these gaps.</div></div><div class="plain" style="animation:fu .5s ease .2s both"><strong>The math:</strong> If implied probabilities add up to <span class="mint">less than 100%</span>, guaranteed profit exists. SBA finds 3-15% margins across 432 markets.</div>`}

W.value=()=>`<div class="S"><div class="label">Strategy 2 & 3 · Zero Risk</div><div class="title">📈 Value Bets — <span class="gn">Same Odds, Bigger Profit</span></div><div class="explain">Same arb. Same two books. Shift your money to one side. Bigger profit if it hits, break even if it doesn't. <strong style="color:var(--wt)">You never lose money.</strong></div></div><div class="slip"><div class="slip-top"><span class="sp">SBA GENIUS · VALUE BET</span><span class="lv"><span class="dt"></span> SAME ODDS</span></div><div style="padding:8px 14px;font-size:11px;color:var(--gy)">Same game: <strong style="color:var(--wt)">+190 / -110</strong> · $1,000</div><div class="orow"><div class="odd act"><div class="ov pl">+190</div><div class="ol">Underdog</div><div class="ob">BOOK A</div></div><div class="odd act"><div class="ov mn">-110</div><div class="ol">Favorite</div><div class="ob">BOOK B</div></div></div><div style="padding:4px 14px"><div class="g3"><button class="sbtn gl" style="margin:0;font-size:11px" onclick="showVB('sure')">🔒 SURE BET</button><button class="sbtn gn" style="margin:0;font-size:11px" onclick="showVB('fav')">📈 VALUE FAV</button><button class="sbtn pp" style="margin:0;font-size:11px" onclick="showVB('dog')">🐕 VALUE DOG</button></div></div><div id="vbr" style="padding:10px 14px"></div></div><div id="vbe"></div><div class="nxt"><button class="sbtn gl" style="width:auto;margin:0 auto;padding:12px 28px" onclick="go('dvb')">NEXT: DOUBLE VALUE →</button></div>`;
