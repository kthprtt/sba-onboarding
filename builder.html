*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#04060A;--b2:#0B1018;--b3:#111A2E;--b4:#1A2540;--gd:#EFA420;--gd2:#FFD06A;--gn:#00E676;--gn2:#69F0AE;--rd:#FF5252;--pp:#B388FF;--cy:#18FFFF;--wt:#ECF0F6;--gy:#5C6E8E;--gy2:#354668;--sl:#0E1322;--slB:#1C2B48;--slH:#141C32}
html{scroll-behavior:smooth}body{background:var(--bg);color:var(--wt);font-family:'DM Sans',sans-serif;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.02'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(239,164,32,.12);border-radius:2px}
nav{position:fixed;top:0;left:0;right:0;z-index:10000;background:rgba(4,6,10,.94);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.03);height:52px;display:flex;align-items:center;padding:0 16px;gap:8px}
.nl{font-family:'Archivo Black';font-size:14px;color:var(--gd);white-space:nowrap}.nl small{font-family:'DM Sans';font-weight:300;font-size:9px;color:var(--gy);margin-left:5px}
.nt{display:flex;gap:2px;margin-left:auto;overflow-x:auto;scrollbar-width:none}.nt::-webkit-scrollbar{display:none}
.tb{padding:6px 12px;font-family:'JetBrains Mono';font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--gy);background:0;border:0;cursor:pointer;border-radius:4px;transition:.2s;white-space:nowrap}.tb:hover{color:var(--wt)}.tb.on{color:var(--gd);background:rgba(239,164,32,.06)}
.V{display:none;padding:52px 16px 32px;animation:fu .35s ease}.V.on{display:block}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.2}}
.S{display:flex;flex-direction:column;align-items:center;padding:14px 0;text-align:center}
.S .label{font-family:'JetBrains Mono';font-size:9px;letter-spacing:3px;color:var(--gd);text-transform:uppercase;margin-bottom:3px}
.S .title{font-family:'Archivo Black';font-size:clamp(18px,3vw,30px);line-height:1.05;margin-bottom:4px}
.S .explain{max-width:480px;font-size:13px;color:var(--gy);line-height:1.6;margin-bottom:12px}
.gd{color:var(--gd)}.gn{color:var(--gn)}.pp{color:var(--pp)}.cy{color:var(--cy)}
.sbtn{display:block;width:calc(100% - 28px);margin:0 14px 10px;padding:12px;border-radius:10px;border:none;font-family:'DM Sans';font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;transition:.3s;text-transform:uppercase;text-align:center}
.sbtn.gl{background:linear-gradient(135deg,var(--gd),var(--gd2));color:var(--bg)}.sbtn.gn{background:linear-gradient(135deg,var(--gn),var(--gn2));color:var(--bg)}.sbtn.pp{background:linear-gradient(135deg,var(--pp),#D1A8FF);color:var(--bg)}

.plain{background:rgba(239,164,32,.02);border-left:3px solid var(--gd);padding:10px 14px;margin:6px 0;font-size:13px;color:var(--gy);line-height:1.65;border-radius:0 6px 6px 0}.plain strong{color:var(--gd2)}.plain .mint{color:var(--gn2)}
.ex{background:var(--b2);border:1px solid rgba(255,255,255,.03);border-radius:12px;padding:18px;margin:12px auto;max-width:700px}.ex-t{font-family:'Archivo Black';font-size:17px;margin-bottom:6px}.ex-b{font-size:13px;color:var(--gy);line-height:1.7}.ex-b strong{color:var(--wt)}

.bdg.o{background:rgba(239,164,32,.04);border:1px solid rgba(239,164,32,.08);color:var(--gd)}.bdg.g{background:rgba(0,230,118,.04);border:1px solid rgba(0,230,118,.08);color:var(--gn)}

.mv-bx.lit{border-color:var(--gn);box-shadow:0 0 24px rgba(0,230,118,.12)}.mv-bx.glit{border-color:var(--gd);box-shadow:0 0 24px rgba(239,164,32,.12)}
.mv-ar{font-size:22px;color:var(--gd);font-family:'JetBrains Mono';font-weight:700}
.term{background:#080C14;border:1px solid rgba(255,255,255,.04);border-radius:12px;overflow:hidden;margin:16px auto;width:min(700px,95vw);box-shadow:0 12px 40px rgba(0,0,0,.5)}
.term-bar{display:flex;gap:6px;padding:10px 14px;background:rgba(255,255,255,.015);border-bottom:1px solid rgba(255,255,255,.04);align-items:center}
.dot{width:10px;height:10px;border-radius:50%}.dr{background:#FF5F57}.dy{background:#FEBC2E}.dg{background:#28C840}
.term-title{font-family:'JetBrains Mono';font-size:11px;color:var(--gy);margin-left:10px}
.term-body{padding:16px 20px;font-family:'JetBrains Mono';font-size:13px;line-height:2.1;max-height:360px;overflow-y:auto;color:#4A5568}
.ucalc{background:var(--b2);border:1px solid var(--slB);border-radius:10px;padding:14px;max-width:600px;margin:10px auto}
.ucalc input[type=range]{width:100%;accent-color:var(--gd);margin:4px 0}
.tl{position:relative;padding-left:20px;max-width:600px;margin:12px auto}.tl::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--gd),var(--gn))}
.tl-i{position:relative;margin-bottom:16px;padding-left:14px;opacity:0;transform:translateX(-12px);transition:all .5s}.tl-i.show{opacity:1;transform:translateX(0)}.tl-i::before{content:'';position:absolute;left:-19px;top:3px;width:8px;height:8px;border-radius:50%;background:var(--gd)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.nxt{text-align:center;margin-top:16px}
.slip{width:min(700px,95vw);background:var(--sl);border:1px solid var(--slB);border-radius:14px;overflow:hidden;box-shadow:0 14px 40px rgba(0,0,0,.5);margin:12px auto}
.slip-top{background:var(--slH);padding:8px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--slB);font-size:10px}
.slip-top .sp{font-family:'JetBrains Mono';color:var(--gd);letter-spacing:2px}
.fb{margin-bottom:6px}.fb-t{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px}.fb-tr{height:5px;background:var(--b4);border-radius:3px;overflow:hidden}.fb-fl{height:100%;border-radius:3px;width:0;transition:width 1s cubic-bezier(.25,1,.5,1)}
.rank-card{background:var(--b3);border:1px solid var(--slB);border-radius:10px;padding:14px;text-align:center;transition:all .6s;opacity:0;transform:translateY(12px)}.rank-card.show{opacity:1;transform:translateY(0)}.rank-card.active{border-color:var(--gd);box-shadow:0 0 16px rgba(239,164,32,.1)}
@media(max-width:768px){.g2,.g3{grid-template-columns:1fr}.slip{width:98vw}.mv-bx{min-width:90px;padding:14px}.mv-bx .n{font-size:20px}.nt{display:none}}

<script>
const $=id=>document.getElementById(id);let cur='cover',TT=[];
function clr(){TT.forEach(clearTimeout);TT=[]}
function fmt(n){return'$'+n.toLocaleString()}
function dl(ms){return new Promise(r=>{TT.push(setTimeout(r,ms))})}
function aV(el,s,e,d){if(!el)return;const t0=performance.now();!function f(n){const p=Math.min((n-t0)/d,1);const v=Math.floor(s+(e-s)*(1-Math.pow(1-p,3)));el.textContent='$'+v.toLocaleString();if(p<1)requestAnimationFrame(f)}(t0)}
const T=[{id:'cover',l:'Home'},{id:'comp',l:'Comp Plan'},{id:'ranks',l:'Ranks'},{id:'scripts',l:'Scripts'},{id:'closer',l:'AI Closer'},{id:'objections',l:'Objections'},{id:'calc',l:'Calculator'},{id:'fast',l:'Fast Start'},{id:'empire',l:'Empire'}];
function nav(){$('tabs').innerHTML=T.map(t=>`<button class="tb${t.id===cur?' on':''}" onclick="go('${t.id}')">${t.l}</button>`).join('')}
function go(id){clr();cur=id;nav();ren();window.scrollTo({top:0})}
function ren(){$('app').innerHTML=`<div class="V on">${(W[cur]||W.cover)()}</div>`;setTimeout(()=>{const h=H[cur];if(h)h()},100)}
const H={};const W={};

W.cover=()=>`<div style="min-height:90vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative"><div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(239,164,32,.04),transparent 60%);pointer-events:none"></div><div style="position:relative;z-index:1"><div style="margin-bottom:16px"><span class="bdg o"><span class="dt"></span> SBA BUILDER ACADEMY</span></div><h1 style="font-family:'Archivo Black';font-size:clamp(36px,7vw,72px);line-height:.92">BUILD YOUR<br><span class="gd">EMPIRE</span></h1><p style="font-size:15px;color:var(--gy);max-width:460px;margin:14px auto 0;line-height:1.7">7 levels of commissions. 7 ranks. <br><strong style="color:var(--wt)">Every person you sign up pays you. Their people pay you too.</strong></p><div style="display:flex;gap:24px;justify-content:center;margin-top:28px;flex-wrap:wrap" id="cov-s"></div><div style="margin-top:28px"><button class="sbtn gl" style="width:auto;padding:14px 32px;display:inline-block" onclick="go('comp')">START BUILDING →</button></div><div style="margin-top:16px;font-size:11px"><a href="https://affiliate.sportsbetarbitrage.com" style="color:var(--gd);text-decoration:none">← Back to Portal</a></div></div></div>`;
H.cover=async()=>{const s=[['7','Levels Deep'],['$600','Per Referral'],['60%','Top Rate'],['$1M+','Potential']];await dl(300);$('cov-s').innerHTML=s.map((x,i)=>`<div style="opacity:0;animation:fu .5s ease ${i*150}ms forwards"><div style="font-family:'JetBrains Mono';font-size:24px;font-weight:700;color:var(--gn)">${x[0]}</div><div style="font-family:'JetBrains Mono';font-size:8px;letter-spacing:2px;color:var(--gy)">${x[1].toUpperCase()}</div></div>`).join('')};

W.comp=()=>`<div class="S"><div class="label">The Bookie Program</div><div class="title">💰 How You Get <span class="gn">Paid</span></div><div class="explain">Sign someone up. You earn a commission. When THEY sign someone up, you earn again. 7 levels deep.</div></div><div class="term"><div class="term-bar"><div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div><span class="term-title">bookie-program.js · Commission Engine</span></div><div class="term-body" id="comp-code"></div></div><div class="math-viz" id="comp-viz" style="display:none"></div><div id="comp-ex" style="display:none"></div><div class="nxt"><button class="sbtn gl" style="width:auto;margin:0 auto;padding:12px 28px" onclick="go('ranks')">SEE THE RANKS →</button></div>`;
H.comp=async()=>{const L=[{t:'<span style="color:var(--gy)">// THE BOOKIE PROGRAM — 7 Levels</span>',d:100},{t:'',d:150},{t:'<span style="color:var(--gd2)">Level 1</span> (your direct signup): <span style="color:var(--gn2)">30%</span> = <span style="color:var(--gn2)">$600</span> on $2K',d:80},{t:'<span style="color:var(--gd2)">Level 2</span> (their signup): <span style="color:var(--gn2)">10%</span> = <span style="color:var(--gn2)">$200</span>',d:80},{t:'<span style="color:var(--gd2)">Level 3</span>: <span style="color:var(--gn2)">5%</span> = <span style="color:var(--gn2)">$100</span>',d:80},{t:'<span style="color:var(--gd2)">Level 4</span>: <span style="color:var(--gn2)">5%</span> = <span style="color:var(--gn2)">$100</span>',d:80},{t:'<span style="color:var(--gd2)">Level 5</span>: <span style="color:var(--gn2)">5%</span> = <span style="color:var(--gn2)">$100</span>',d:80},{t:'<span style="color:var(--gd2)">Level 6</span>: <span style="color:var(--gn2)">3%</span> = <span style="color:var(--gn2)">$60</span>',d:80},{t:'<span style="color:var(--gd2)">Level 7</span>: <span style="color:var(--gn2)">2%</span> = <span style="color:var(--gn2)">$40</span>',d:80},{t:'',d:200},{t:'<span style="color:var(--gd2)">════════════════════════════</span>',d:100},{t:'<span style="color:var(--gn2);font-size:16px;font-weight:700">TOTAL PER TREE: $1,200 from ONE person\'s $2K</span>',d:200},{t:'<span style="color:var(--gd2)">That\'s 60% of every dollar in your tree.</span>',d:200}];const b=$('comp-code');b.innerHTML='';for(const l of L){await dl(l.d);b.innerHTML+=l.t+'<br>';b.scrollTop=b.scrollHeight}await dl(500);$('comp-viz').style.display='flex';$('comp-viz').innerHTML=`<div class="mv-bx"><div class="n" style="color:var(--gy)">$2,000</div><div class="l">Member Pays</div></div><div class="mv-ar">→</div><div class="mv-bx lit"><div class="n" style="color:var(--gn)" id="cv1">$0</div><div class="l">L1: You</div></div><div class="mv-ar">+</div><div class="mv-bx glit"><div class="n" style="color:var(--gd)" id="cv2">$0</div><div class="l">L2-L7: Your Tree</div></div>`;aV($('cv1'),0,600,1200);aV($('cv2'),0,600,1500);await dl(2000);$('comp-ex').style.display='block';$('comp-ex').style.animation='fu .5s ease';$('comp-ex').innerHTML=`<div class="ex"><div class="ex-t">The Power of 7 Levels</div><div class="ex-b">You sign up <strong>3 people</strong>. They each sign up <strong>3 people</strong>. Those 9 each sign up <strong>3</strong>. By Level 4, you have <strong>120 people</strong> in your tree — all paying you on every cycle.<br><br><strong style="color:var(--gd)">3 → 9 → 27 → 81 → 243 → 729 → 2,187</strong><br><br>At $2K avg: Level 1 alone = <span style="color:var(--gn)">$1,800</span>. Full tree = <span style="color:var(--gd)">$131,220 per 40-day cycle.</span></div></div>`};

W.ranks=()=>`<div class="S"><div class="label">7 Ranks</div><div class="title">🏆 Climb The <span class="gd">Ranks</span></div><div class="explain">More referrals = higher rank = bigger bonuses. Hit rank requirements each 40-day cycle.</div></div><div class="g3" style="max-width:700px;margin:0 auto;gap:10px" id="rank-grid"></div><div class="plain" style="max-width:700px;margin:16px auto"><strong>Ranks reset each cycle.</strong> Hit the requirements within your 40-day cycle to maintain or climb. Your commissions are permanent — ranks unlock <span class="mint">bonus payouts and team volume bonuses.</span></div><div class="nxt"><button class="sbtn gl" style="width:auto;margin:0 auto;padding:12px 28px" onclick="go('scripts')">GET THE SCRIPTS →</button></div>`;
H.ranks=async()=>{const R=[{n:'Starter',r:'0',b:'—',c:'gy'},{n:'Builder',r:'3 refs',b:'+$50',c:'gn'},{n:'Hustler',r:'7 refs',b:'+$100',c:'gn'},{n:'Leader',r:'15 refs',b:'+$250',c:'gd'},{n:'Captain',r:'30 refs',b:'+$500',c:'gd'},{n:'Elite',r:'50 refs',b:'+$1,000',c:'pp'},{n:'Legend',r:'100 refs',b:'+$5,000',c:'gd'}];$('rank-grid').innerHTML=R.map((r,i)=>`<div class="rank-card" id="rk${i}" style="transition-delay:${i*100}ms"><div style="font-family:'Archivo Black';font-size:16px;color:var(--${r.c})">${r.n}</div><div style="font-family:'JetBrains Mono';font-size:10px;color:var(--gy);margin:4px 0">${r.r}</div><div style="font-family:'JetBrains Mono';font-size:14px;font-weight:700;color:var(--${r.c})">${r.b}</div></div>`).join('');R.forEach((r,i)=>{TT.push(setTimeout(()=>{$('rk'+i).classList.add('show');if(i===0)$('rk'+i).classList.add('active')},i*200+200))})};

W.scripts=()=>`<div class="S"><div class="label">Ready-Made Scripts</div><div class="title">📝 Copy, Paste, <span class="gn">Close</span></div><div class="explain">Battle-tested scripts for every situation. Click to copy.</div></div><div id="script-cards" style="max-width:700px;margin:0 auto"></div><div class="nxt"><button class="sbtn gl" style="width:auto;margin:0 auto;padding:12px 28px" onclick="go('closer')">AI CLOSER →</button></div>`;
H.scripts=()=>{const S=[{t:'🔥 Cold DM',m:'Hey [Name], random question — if there was a way to make an extra $500-$1,000/week with sports without gambling, would you want to hear about it? No picks. No risk. Just math.',c:'gn'},{t:'✉️ Follow-Up Email',m:'Subject: Following up on SBA\\n\\nHey [Name], just locked in more profits this week. The system scans 60+ leagues every 60 seconds. National launch coming — everything before then counts toward $22K+ in bonuses. Link: [your ref link]',c:'gd'},{t:'💬 Text After Interest',m:'Great question! So basically two sportsbooks disagree on odds for the same game. You bet both sides on different books. One HAS to win. You profit either way. Our tool finds these automatically. Want me to show you a 2-min example?',c:'pp'},{t:'🎯 The Close',m:'So which package works best?\\n\\n💵 Basic ($1K) — Sure bets, hedging\\n💰 Plus ($2K) — + Advanced strategies\\n🔥 Elite ($5K) — Full platform + War Room\\n👑 Pro ($10K) — Everything + VIP\\n\\nI\\'ll personally walk you through your first bet tonight.',c:'gd'},{t:'📱 Social Media Post',m:'Just locked in $247 profit in 12 minutes. No picks. No gambling. Just math. Two sportsbooks disagreed on the odds — I bet both sides. One had to win. I made $247 guaranteed. DM me if you want to learn how.',c:'gn'}];$('script-cards').innerHTML=S.map(s=>`<div class="ex" style="cursor:pointer;border-color:var(--${s.c})22;transition:all .3s" onclick="navigator.clipboard.writeText(\`${s.m.replace(/`/g,"'")}\`);this.querySelector('.copy-badge').textContent='✅ Copied!';setTimeout(()=>this.querySelector('.copy-badge').textContent='📋 Click to copy',1500)" onmouseover="this.style.borderColor='var(--${s.c})'" onmouseout="this.style.borderColor='var(--${s.c})22'"><div class="ex-t">${s.t} <span class="copy-badge" style="font-family:'JetBrains Mono';font-size:9px;color:var(--gy);float:right">📋 Click to copy</span></div><div class="formula" style="white-space:pre-wrap">${s.m}</div></div>`).join('')};

/div></div>`).join('')};

H.calc=()=>{cc()};
function cc(){const d=+($('cdr')||{}).value||5,p=+($('cpr')||{}).value||2000,s=+($('csr')||{}).value||2;$('cd').textContent=d;$('cp').textContent=fmt(p);$('cs').textContent=s;const l1=d*p*0.30,l2=d*s*p*0.10,l3=d*s*s*p*0.05,l4=d*s*s*s*p*0.05;const tot=l1+l2+l3+l4;$('ccr').innerHTML=`<div style="padding:10px;background:var(--b3);border-radius:8px;text-align:center"><div style="font-family:'JetBrains Mono';font-size:8px;color:var(--gn);letter-spacing:1px">LEVEL 1 (${d} people)</div><div style="font-family:'JetBrains Mono';font-size:20px;font-weight:700;color:var(--gn2)">${fmt(Math.round(l1))}</div></div><div style="padding:10px;background:var(--b3);border-radius:8px;text-align:center"><div style="font-family:'JetBrains Mono';font-size:8px;color:var(--gd);letter-spacing:1px">LEVEL 2 (${d*s} people)</div><div style="font-family:'JetBrains Mono';font-size:20px;font-weight:700;color:var(--gd2)">${fmt(Math.round(l2))}</div></div><div style="padding:10px;background:var(--b3);border-radius:8px;text-align:center"><div style="font-family:'JetBrains Mono';font-size:8px;color:var(--pp);letter-spacing:1px">LEVEL 3 (${d*s*s} people)</div><div style="font-family:'JetBrains Mono';font-size:20px;font-weight:700;color:var(--pp)">${fmt(Math.round(l3))}</div></div><div style="padding:10px;background:var(--b3);border-radius:8px;text-align:center"><div style="font-family:'JetBrains Mono';font-size:8px;color:var(--cy);letter-spacing:1px">LEVEL 4+ (${d*s*s*s}+ people)</div><div style="font-family:'JetBrains Mono';font-size:20px;font-weight:700;color:var(--cy)">${fmt(Math.round(l4))}</div></div>`;$('cctot').textContent=fmt(Math.round(tot));$('ccyr').textContent='Per year (9 cycles): '+fmt(Math.round(tot*9))}
