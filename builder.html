<script>
const $=id=>document.getElementById(id);let cur='cover',TT=[];
function clr(){TT.forEach(clearTimeout);TT=[]}
function fmt(n){return'$'+n.toLocaleString()}
function dl(ms){return new Promise(r=>{TT.push(setTimeout(r,ms))})}
function aV(el,s,e,d){if(!el)return;const t0=performance.now();!function f(n){const p=Math.min((n-t0)/d,1);const v=Math.floor(s+(e-s)*(1-Math.pow(1-p,3)));el.textContent='$'+v.toLocaleString();if(p<1)requestAnimationFrame(f)}(t0)}
function aP(el,s,e,d){if(!el)return;const t0=performance.now();!function f(n){const p=Math.min((n-t0)/d,1);const v=Math.floor(s+(e-s)*(1-Math.pow(1-p,3)));el.textContent=v.toLocaleString();if(p<1)requestAnimationFrame(f)}(t0)}

const T=[{id:'cover',l:'Home'},{id:'why',l:'Why Build'},{id:'comp',l:'Comp Plan'},{id:'tree',l:'Your Tree'},{id:'ranks',l:'Ranks'},{id:'funnel',l:'Pipeline'},{id:'scripts',l:'Scripts'},{id:'objections',l:'Objections'},{id:'closer',l:'AI Closer'},{id:'calc',l:'Calculator'},{id:'fast',l:'Fast Start'},{id:'empire',l:'Empire'}];

function ren(){$('app').innerHTML=`<div class="V on">${(W[cur]||W.cover)()}</div>`;setTimeout(()=>{const h=H[cur];if(h)h()},100)}
const H={};const W={};

/* ═══ COVER ═══ */
W.cover=()=>`<div style="min-height:90vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative"><div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(239,164,32,.04),transparent 60%);pointer-events:none"></div><div style="position:relative;z-index:1"><div style="margin-bottom:16px"><span class="bdg o"><span class="dt"></span> SBA BUILDER ACADEMY</span></div><h1 style="font-family:'Archivo Black';font-size:clamp(36px,7vw,72px);line-height:.92">BUILD YOUR<br><span class="gd">EMPIRE</span></h1><p style="font-size:15px;color:var(--gy);max-width:500px;margin:14px auto 0;line-height:1.7">Two income streams. One system.<br>Bet AND build your way to <strong style="color:var(--wt)">$1 million.</strong></p><div style="display:flex;gap:24px;justify-content:center;margin-top:28px;flex-wrap:wrap" id="cov-s"></div><div style="margin-top:28px"><button class="sbtn gl" style="width:auto;padding:14px 32px;display:inline-block" onclick="go('why')">START BUILDING →</button></div><div style="margin-top:16px;font-size:11px"><a href="https://affiliate.sportsbetarbitrage.com" style="color:var(--gd);text-decoration:none">← Back to Portal</a> · <a href="https://onboarding.sportsbetarbitrage.com/academy.html" style="color:var(--gn);text-decoration:none">Betting Academy →</a></div></div></div>`;

/* ═══ WHY BUILD ═══ */
W.why=()=>`<div class="S"><div class="label">The Opportunity</div><div class="title">Why Building is <span class="gd">Non-Negotiable</span></div><div class="explain">Betting makes you money. Building makes you <strong style="color:var(--wt)">wealthy.</strong></div></div>

<div class="ex"><div class="ex-t">Two Streams > One Stream</div><div class="ex-b"><strong>Stream 1 — Betting:</strong> $500-$7,000/month from Sure Bets, DVB, Power Play.<br><strong>Stream 2 — Building:</strong> $1,800-$131,000+ per 40-day cycle from commissions.<br><br>Why choose one when the same portal gives you both? <strong style="color:var(--gd)">Every person you sign up becomes your betting bankroll AND your commission engine.</strong></div></div>
<div class="ex"><div class="ex-t">The Compound Effect</div><div class="formula"><span class="gl">MONTH 1:</span> You sign up 5 people → <span class="hl">$3,000 commissions</span><br><span class="gl">MONTH 2:</span> They each sign 2 → 10 new people → <span class="hl">$5,000 commissions</span><br><span class="gl">MONTH 3:</span> Tree grows to 35 → <span class="hl">$12,000 commissions</span><br><span class="gl">MONTH 6:</span> Tree at 200+ → <span class="hl">$50,000+ commissions</span><br><br><span style="color:var(--gn2);font-weight:700">Plus your betting income. Plus your bankroll grew from commissions.</span></div></div>
<div class="nxt"><button class="sbtn gl" style="width:auto;margin:0 auto;padding:12px 28px" onclick="go('comp')">SEE THE COMP PLAN →</button></div>`;
H.why=async()=>{const data=[{l:'M1',a:2000,b:5000},{l:'M3',a:6000,b:18000},{l:'M6',a:15000,b:65000},{l:'M12',a:36000,b:200000}];$('why-bars').innerHTML=data.map(d=>`<div class="bar-col"><div class="bar-val" id="bv-a-${d.l}">$0</div><div class="bar" id="b-a-${d.l}" style="background:var(--gy2);width:45%;margin-right:2px"></div><div class="bar-val" id="bv-b-${d.l}" style="color:var(--gd)">$0</div><div class="bar" id="b-b-${d.l}" style="background:linear-gradient(to top,var(--gd),var(--gd2));width:45%;margin-left:2px"></div><div class="bar-lbl">${d.l}</div></div>`).join('');await dl(400);const mx=200000;data.forEach((d,i)=>{TT.push(setTimeout(()=>{$('b-a-'+d.l).style.height=(d.a/mx*100)+'%';$('b-b-'+d.l).style.height=(d.b/mx*100)+'%';$('bv-a-'+d.l).classList.add('show');$('bv-b-'+d.l).classList.add('show');aV($('bv-a-'+d.l),0,d.a,1200);aV($('bv-b-'+d.l),0,d.b,1200)},i*300))})};

/* ═══ COMP PLAN ═══ */
W.comp=()=>`<div class="S"><div class="label">The Bookie Program</div><div class="title">💰 7 Levels of <span class="gn">Commissions</span></div><div class="explain">Every person in your tree pays you. Every 40-day cycle.</div></div><div class="term"><div class="term-bar"><div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div><span class="term-title">bookie-program.js · Commission Engine</span></div><div class="term-body" id="comp-code"></div></div><div class="math-viz" id="comp-viz" style="display:none"></div><div id="comp-ex" style="display:none"></div><div class="nxt"><button class="sbtn gl" style="width:auto;margin:0 auto;padding:12px 28px" onclick="go('tree')">WATCH YOUR TREE GROW →</button></div>`;
H.comp=async()=>{const L=[{t:'<span style="color:var(--gy)">// BOOKIE PROGRAM — Ambassador Rates</span>',d:100},{t:'',d:100},{t:'<span style="color:var(--gd2)">Level 1</span> (your direct): <span style="color:var(--gn2)">30%</span> = <span style="color:var(--gn2)">$600</span> on $2K',d:80},{t:'<span style="color:var(--gd2)">Level 2</span> (their people): <span style="color:var(--gn2)">10%</span> = <span style="color:var(--gn2)">$200</span>',d:80},{t:'<span style="color:var(--gd2)">Level 3</span>: <span style="color:var(--gn2)">5%</span> = <span style="color:var(--gn2)">$100</span>',d:80},{t:'<span style="color:var(--gd2)">Level 4</span>: <span style="color:var(--gn2)">5%</span> = <span style="color:var(--gn2)">$100</span>',d:80},{t:'<span style="color:var(--gd2)">Level 5</span>: <span style="color:var(--gn2)">5%</span> = <span style="color:var(--gn2)">$100</span>',d:80},{t:'<span style="color:var(--gd2)">Level 6</span>: <span style="color:var(--gn2)">3%</span> = <span style="color:var(--gn2)">$60</span>',d:80},{t:'<span style="color:var(--gd2)">Level 7</span>: <span style="color:var(--gn2)">2%</span> = <span style="color:var(--gn2)">$40</span>',d:80},{t:'',d:200},{t:'<span style="color:var(--gd2)">════════════════════════════════════</span>',d:100},{t:'<span style="color:var(--gn2);font-size:15px;font-weight:700">TOTAL: 60% of every dollar flows through your tree</span>',d:200}];const b=$('comp-code');b.innerHTML='';for(const l of L){await dl(l.d);b.innerHTML+=l.t+'<br>';b.scrollTop=b.scrollHeight}await dl(500);$('comp-viz').style.display='flex';$('comp-viz').innerHTML=`<div class="mv-bx"><div class="n" style="color:var(--gy)">$2,000</div><div class="l">Member Pays</div></div><div class="mv-ar">→</div><div class="mv-bx lit"><div class="n" style="color:var(--gn)" id="cv1">$0</div><div class="l">Level 1: You</div></div><div class="mv-ar">+</div><div class="mv-bx glit"><div class="n" style="color:var(--gd)" id="cv2">$0</div><div class="l">Levels 2-7</div></div>`;aV($('
